<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Table</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .stock-table {
            width: 50%;
            margin: 20px auto;
            border-collapse: collapse;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .stock-table th, .stock-table td {
            border: 1px solid #ddd;
            padding: 10px;
        }
        .stock-table th {
            background-color: #f4f4f4;
            font-weight: bold;
        }
        .stock-table .positive {
            color: green;
        }
        .stock-table .negative {
            color: red;
        }
        .section-header {
            text-align: center;
            margin: 20px 0;
            font-size: 1.2em;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="section-header">U.S. Markets - Companies</div>
    <table class="stock-table">
        <thead>
            <tr>
                <th>Company</th>
             
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Apple</td>
              
            </tr>
            <tr>
                <td>Amazon</td>
               
            </tr>
            <tr>
                <td>Google</td>
                
            </tr>
            <tr>
                <td>Microsoft</td>
              
            </tr>
            <tr>
                <td>Tesla</td>
                
            </tr>
        </tbody>
    </table>
</body>
</html>
