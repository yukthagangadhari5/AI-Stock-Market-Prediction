<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amazon Stock Graph</title>
    <style>
        /* Ensure the body and html take up the full height of the viewport */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            color: #333;
        }

        /* Header Section */
        header {
            background-color: #1a73e8;
            color: white;
            padding: 20px 30px;
            text-align: center;
            font-size: 24px;
        }

        /* Main Container */
        .container {
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Time Range Buttons on the left corner */
        .time-range-buttons {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .time-range-buttons button {
            background-color: #1a73e8;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            transition: background-color 0.3s;
        }

        .time-range-buttons button:hover {
            background-color: #155bb5;
        }

        /* Iframe Container */
        .iframe-container {
            position: relative;
            width: 100%;
            height: 80vh;  /* Adjust to make it fit well within the page */
            margin-top: 40px;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            /* Make sure the iframe adjusts to container size */
        }

    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>Amazon Stock Performance Graph</h1>
    </header>

    <!-- Main Container -->
    <div class="container">
        
        <!-- Iframe for Stock Graph -->
        <div class="iframe-container">
            <iframe id="stock-graph" src="https://lookerstudio.google.com/embed/reporting/6e1e47f1-67fb-4c8a-85dd-25be0f7c2c00/page/xbPJE"></iframe>
        </div>
    </div>

    <script>
        function changeTimeRange(range) {
            var iframe = document.getElementById('stock-graph');
            var baseUrl = "https://lookerstudio.google.com/embed/reporting/6e1e47f1-67fb-4c8a-85dd-25be0f7c2c00/page/xbPJE";
            iframe.src = baseUrl + "?time=" + range;
        }
    </script>

</body>
</html>
