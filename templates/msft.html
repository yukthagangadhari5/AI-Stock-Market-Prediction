<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microsoft Stock Graph</title>
    <style>
        /* Same styles as before */
        html, body { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f5f7fa; color: #333; }
        header { background-color: #1a73e8; color: white; padding: 20px 30px; text-align: center; font-size: 24px; }
        .container { padding: 20px; max-width: 1200px; margin: 0 auto; }
        .time-range-buttons { display: flex; gap: 15px; margin-top: 20px; }
        .time-range-buttons button { background-color: #1a73e8; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; transition: background-color 0.3s; }
        .time-range-buttons button:hover { background-color: #155bb5; }
        .iframe-container { position: relative; width: 100%; height: 80vh; margin-top: 40px; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <header>
        <h1>Microsoft Stock Performance Graph</h1>
    </header>

    <div class="container">
        
        </div>

        <div class="iframe-container">
            <iframe id="stock-graph" src="https://lookerstudio.google.com/embed/reporting/c240730f-c79b-419e-8c9e-3598897bf91e/page/OGjPE"></iframe>
        </div>
    </div>

    <script>
        function changeTimeRange(range) {
            var iframe = document.getElementById('stock-graph');
            var baseUrl = "https://lookerstudio.google.com/embed/reporting/c240730f-c79b-419e-8c9e-3598897bf91e/page/OGjPE";
            iframe.src = baseUrl + "?time=" + range;
        }
    </script>

</body>
</html>
