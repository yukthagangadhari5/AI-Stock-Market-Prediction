{% extends "base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}
<div class="dashboard">
  <div class="dashboard-header">
    <h2>Stock Predictor</h2>
    <p>Enter a stock ticker and how many days ahead to predict.</p>
  </div>

  <div class="control-panel">
    <div class="form-group">
      <label>Stock Ticker</label>
      <input type="text" id="ticker" value="AAPL" placeholder="e.g. AAPL, TSLA, GOOGL">
    </div>
    <div class="form-group">
      <label>Forecast Days</label>
      <select id="days">
        <option value="7">7 days</option>
        <option value="14">14 days</option>
        <option value="30" selected>30 days</option>
        <option value="60">60 days</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="runPrediction()">
      <span id="btn-text">🚀 Predict</span>
    </button>
  </div>

  <div id="loading" class="loading hidden">
    <div class="spinner"></div>
    <p>Training LSTM model on historical data…</p>
  </div>

  <div id="results" class="results hidden">
    <div class="stats-row" id="stats-row"></div>
    <div id="chart-container"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/chart.js') }}"></script>
{% endblock %}
